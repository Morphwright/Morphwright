# Cloudflare Pages project config for Morphwright.
# Static site: Pages serves the built `dist/` directly (no adapter / no Functions).
#
# Git-connected deploy (recommended): set in the Cloudflare dashboard instead —
#   Build command:            npm run build
#   Build output directory:   dist
# Direct upload from a machine that is `wrangler login`-ed:
#   npm run build && npx wrangler pages deploy dist --project-name=morphwright
name = "morphwright"
pages_build_output_dir = "dist"
